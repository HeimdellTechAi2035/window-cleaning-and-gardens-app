[build]
  # Requires DATABASE_URL (pooled) and DATABASE_URL_UNPOOLED (direct) set
  # as regular project environment variables — e.g. from a standalone
  # Neon project's connection strings. Netlify's own native "Database"
  # feature does not expose a usable connection string for this.
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
